<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React App - Component Showcase</title>
    
    <!-- Link to CSS Stylesheets -->
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f5f5f5;
            color: #2c3e50;
        }

        #root {
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section h2 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 0.5rem;
        }

        .showcase {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Application -->
    <script type="text/babel">
        const { useState } = React;

        // Button Component Showcase
        function ButtonShowcase() {
            return (
                <section className="section">
                    <h2>Buttons</h2>
                    <div className="showcase">
                        <div className="card">
                            <div className="card-body">
                                <h3>Primary Button</h3>
                                <button className="btn btn-primary mt-2">Primary</button>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Secondary Button</h3>
                                <button className="btn btn-secondary mt-2">Secondary</button>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Accent Button</h3>
                                <button className="btn btn-accent mt-2">Accent</button>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Outline Button</h3>
                                <button className="btn btn-outline mt-2">Outline</button>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Button Sizes</h3>
                                <div className="flex flex-column gap-2">
                                    <button className="btn btn-primary btn-sm">Small</button>
                                    <button className="btn btn-primary">Normal</button>
                                    <button className="btn btn-primary btn-lg">Large</button>
                                </div>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Disabled Button</h3>
                                <button className="btn btn-primary mt-2" disabled>Disabled</button>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // Badge Component Showcase
        function BadgeShowcase() {
            return (
                <section className="section">
                    <h2>Badges</h2>
                    <div className="showcase">
                        <div className="card">
                            <div className="card-body">
                                <h3>Default Badge</h3>
                                <span className="badge mt-2">Default</span>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Primary Badge</h3>
                                <span className="badge badge-primary mt-2">Primary</span>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Success Badge</h3>
                                <span className="badge badge-success mt-2">Success</span>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Warning Badge</h3>
                                <span className="badge badge-warning mt-2">Warning</span>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Danger Badge</h3>
                                <span className="badge badge-danger mt-2">Danger</span>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // Card Component Showcase
        function CardShowcase() {
            return (
                <section className="section">
                    <h2>Cards</h2>
                    <div className="showcase">
                        <div className="card">
                            <div className="card-header">Card Header</div>
                            <div className="card-body">
                                <p>This is the card body content. Cards are great for organizing content into sections.</p>
                            </div>
                            <div className="card-footer">Card Footer</div>
                        </div>
                        <div className="card">
                            <div className="card-header">Features</div>
                            <div className="card-body">
                                <ul style={{ paddingLeft: '1.5rem' }}>
                                    <li>Responsive design</li>
                                    <li>Hover effects</li>
                                    <li>Easy to customize</li>
                                </ul>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-header">Interactive</div>
                            <div className="card-body">
                                <p>Hover over cards to see the elevation effect!</p>
                                <button className="btn btn-primary btn-sm mt-2">Learn More</button>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // Modal Component
        function ModalShowcase() {
            const [showModal, setShowModal] = useState(false);

            return (
                <section className="section">
                    <h2>Modal</h2>
                    <div className="showcase">
                        <div className="card">
                            <div className="card-body text-center">
                                <h3>Click to Open Modal</h3>
                                <button className="btn btn-primary mt-2" onClick={() => setShowModal(true)}>
                                    Open Modal
                                </button>
                            </div>
                        </div>
                    </div>

                    {showModal && (
                        <div className="modal active">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h2>Modal Title</h2>
                                    <button className="modal-close" onClick={() => setShowModal(false)}>×</button>
                                </div>
                                <div className="modal-body">
                                    <p>This is a modal dialog. It demonstrates interactive React state management with the CSS styling.</p>
                                </div>
                                <div className="modal-footer">
                                    <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Cancel</button>
                                    <button className="btn btn-primary" onClick={() => setShowModal(false)}>Confirm</button>
                                </div>
                            </div>
                        </div>
                    )}
                </section>
            );
        }

        // Tabs Component
        function TabsShowcase() {
            const [activeTab, setActiveTab] = useState('tab1');

            return (
                <section className="section">
                    <h2>Tabs</h2>
                    <div className="card">
                        <div className="tabs">
                            <button 
                                className={`tab ${activeTab === 'tab1' ? 'active' : ''}`}
                                onClick={() => setActiveTab('tab1')}
                            >
                                Tab 1
                            </button>
                            <button 
                                className={`tab ${activeTab === 'tab2' ? 'active' : ''}`}
                                onClick={() => setActiveTab('tab2')}
                            >
                                Tab 2
                            </button>
                            <button 
                                className={`tab ${activeTab === 'tab3' ? 'active' : ''}`}
                                onClick={() => setActiveTab('tab3')}
                            >
                                Tab 3
                            </button>
                        </div>
                        <div className="card-body">
                            <div className={`tab-content ${activeTab === 'tab1' ? 'active' : ''}`}>
                                <h3>Tab 1 Content</h3>
                                <p>This is the content for the first tab.</p>
                            </div>
                            <div className={`tab-content ${activeTab === 'tab2' ? 'active' : ''}`}>
                                <h3>Tab 2 Content</h3>
                                <p>This is the content for the second tab.</p>
                            </div>
                            <div className={`tab-content ${activeTab === 'tab3' ? 'active' : ''}`}>
                                <h3>Tab 3 Content</h3>
                                <p>This is the content for the third tab.</p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // Progress Bar Component
        function ProgressShowcase() {
            return (
                <section className="section">
                    <h2>Progress Bars</h2>
                    <div className="showcase">
                        <div className="card">
                            <div className="card-body">
                                <h3>Primary Progress</h3>
                                <div className="progress mt-2">
                                    <div className="progress-bar primary" style={{ width: '75%' }}></div>
                                </div>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Success Progress</h3>
                                <div className="progress mt-2">
                                    <div className="progress-bar success" style={{ width: '100%' }}></div>
                                </div>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-body">
                                <h3>Warning Progress</h3>
                                <div className="progress mt-2">
                                    <div className="progress-bar warning" style={{ width: '60%' }}></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // Main App Component
        function App() {
            return (
                <>
                    <header>
                        <h1>🎨 React Component Showcase</h1>
                        <p>Interactive UI Components with Responsive Design</p>
                    </header>
                    <main>
                        <ButtonShowcase />
                        <BadgeShowcase />
                        <CardShowcase />
                        <ModalShowcase />
                        <TabsShowcase />
                        <ProgressShowcase />
                    </main>
                    <footer>
                        <p>&copy; 2025 React App with Responsive CSS. Built with React & Custom Styling.</p>
                    </footer>
                </>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
